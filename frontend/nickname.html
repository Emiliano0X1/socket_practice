<html>
  <head>
    <title>Chat en tiempo real</title>
    <link rel="stylesheet" href="positionsNick.css">
  </head>
  <body style="background-color: rgb(160, 235, 74);">
      <h1>Chat en tiempo real</h1>
      <h3>Práctica de Sockets elaborado por:</h3>
        Andrés Silva López<br>
        Emiliano Gonzalez Pérez<br>
        Carlos Miguel Ibarra Mora
      </h3>

      <br> <br>

      <h2>Ingresa tu nombre de usuario</h2>

    <form id="nicknameForm">
        <input id="nicknameInput" type="text" placeholder="Nickname" required></input>
        <button type="submit">Entrar al chat</button>
      </form>

      <br>

      <img src="fotos/terrified-ishowspeed.jpg" style="display: block; margin: 0 auto; width: 30%;">


      <script> 

      //Make the process to send the nickname to the chat
      
        document.getElementById('nicknameForm').addEventListener("submit", (e) => {
          e.preventDefault();

          const nickname = document.getElementById('nicknameInput').value
          console.log("Nickname obtenido: ", nickname)

          if(nickname === '' || nickname === undefined){
              alert("Vuelve a ingresar tu usuario, no dejes campos vacios")
          }

          window.location.href = "chat.html?nickname=" + nickname
        
        })

      </script>
  </body>
</html>
